<svg fill="none" viewBox="0 0 385 100" width="385" height="100" xmlns="http://www.w3.org/2000/svg">
    <foreignObject width="100%" height="100%">
    <style>
      @import url("https://fonts.googleapis.com/css?family=JetBrainsMono");
      .body {
        width: 385;
        height: 100;

        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        text-anchor: middle;
        transform-box: fill-box;
        transform-origin: center;

        background-color: transparent;
        color: #dfbf8e;
        font-family: "JetBrains Mono", monospace;
      }

      .username {
        margin-bottom: -3px;
        margin-top: 0px;
        font-size: 30px;
        animation: username;
      }

      .subtitle {
        display:flex;
        font-size: 20px;
        animation: subtitle;
      }
      .subtitle-1 {
        animation: subtitle-1;
      }
      .subtitle-2 {
        animation: subtitle-2;
      }
      .subtitle-3 {
        animation: subtitle-3;
      }

      .username,
      .subtitle,
      .subtitle-1,
      .subtitle-2,
      .subtitle-3 {
        animation-duration: 10s;
        animation-iteration-count: infinite;
      }

      @keyframes username {
        0% {
          transform: translate(0px, 110px) scale(10%);
          opacity: 0%;
        }

        7% {
          transform: translate(0px, 0px) scale(50%);
          opacity: 50%;
        }

        16% {
          transform: translate(0px, 0px);
          opacity: 100%;
        }

        80% {
          opacity: 100%
        }
        90% {
          opacity: 0%
        }
        100% {
          opacity: 0%
        }
      }
      @keyframes subtitle-1{
        0% {
          transform: translate(-300px, 0px);
        }

        11% {
          transform: translate(-300px, 0px);
        }

        20% {
          transform: translate(0px, 0px);
        }
      }
      @keyframes subtitle-2{
        0% {
          opacity: 0%;
        }

        19% {
          opacity: 0%;
        }

        22% {
          opacity: 100%;
        }
      }
      @keyframes subtitle-3{
        0% {
          transform: translate(300px, 0px);
        }

        11% {
          transform: translate(300px, 0px);
        }

        20% {
          transform: translate(0px, 0px);
        }
      }
      @keyframes subtitle{
        0% {
          opacity: 100%
        }
        70% {
          opacity: 100%
        }
        80% {
          opacity: 0%
        }
        100% {
          opacity: 0%
        }
      }
    </style>
    <g class="body" xmlns="http://www.w3.org/1999/xhtml">
        <text class="username">Adriano Oliviero</text>
        <g class="subtitle">
          <tspan class="subtitle-1">ad</tspan>
          <tspan class="subtitle-2">-</tspan>
          <tspan class="subtitle-3">oliviero</tspan>
        </g>
    </g>
    </foreignObject>
</svg>
