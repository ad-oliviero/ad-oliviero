<svg fill="none" viewBox="0 0 385 100" width="385" height="100" xmlns="http://www.w3.org/2000/svg">
    <foreignObject width="100%" height="100%">
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono');
      .body {
        display: flex;
        flex-direction: column;
        align-items: center;

        color: #dfbf8e;
        font-family: "JetBrains Mono", monospace;
      }

      .username {
        margin-bottom: -3px;
        margin-top: 0px;
        font-size: 30px;
        transform-origin: center;
        transform-box: fill-box;
        animation: username-an 10s infinite;
      }

      .subtitle {
        display:flex;
        font-size: 20px;
        animation: subtitle-an 10s infinite;
      }
      .sub-1 { animation: sub-1-an 10s infinite; }
      .sub-2 { animation: sub-2-an 10s infinite; }
      .sub-3 { animation: sub-3-an 10s infinite; }

      @keyframes username-an {
        0% {  transform: translateY(110px) scale(0.1); opacity: 0; }
        7% {  transform: translateY(0px) scale(0.5); opacity: 0.5; }
        16% {  transform: translateY(0px); opacity: 1; }
        80% { opacity: 1 }
        90% { opacity: 0 }
        100% { opacity: 0 }
      }
      @keyframes subtitle-an {
        0% { opacity: 1 }
        70% { opacity: 1 }
        80% { opacity: 0 }
        100% { opacity: 0 }
      }
      @keyframes sub-1-an {
        0% { transform: translateX(-300px); }
        11% { transform: translateX(-300px); }
        20% { transform: translateX(0px); }
      }
      @keyframes sub-2-an {
        0% { opacity: 0; }
        19% { opacity: 0; }
        22% { opacity: 1; }
      }
      @keyframes sub-3-an {
        0% { transform: translateX(300px); }
        11% { transform: translateX(300px); }
        20% { transform: translateX(0px); }
      }
    </style>
    <g class="body" xmlns="http://www.w3.org/1999/xhtml">
        <text class="username">Adriano Oliviero</text>
        <g class="subtitle">
          <tspan class="sub-1">ad</tspan>
          <tspan class="sub-2">-</tspan>
          <tspan class="sub-3">oliviero</tspan>
        </g>
    </g>
    </foreignObject>
</svg>
